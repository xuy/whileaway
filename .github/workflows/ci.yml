name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # server: bus unit/behavior tests, on both storage drivers
      - run: npm ci --prefix server
      - run: npm test --prefix server
      - run: npm run test:sqlite --prefix server
      # mcp: client + stdio-server tests (these spawn the bus, so server deps must be installed above)
      - run: npm ci --prefix mcp
      - run: npm test --prefix mcp
