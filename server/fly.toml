# Fly.io config for the whileaway bus.
#   fly apps create whileaway-bus
#   fly secrets set WHILEAWAY_KEY=$(openssl rand -hex 18) --app whileaway-bus
#   fly deploy --app whileaway-bus --ha=false
app = "whileaway-bus"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

# State is in-memory here (ephemeral): default channels/subscriptions are re-seeded on boot and
# the pushers repopulate content, so the demo self-heals on restart. For durable custom channels/
# subscriptions, add a volume and uncomment the mount below:
#   fly volumes create whileaway_data --size 1 --region iad --app whileaway-bus
# [env] WHILEAWAY_STATE = "/data/.whileaway-state.json"
# [[mounts]]
#   source = "whileaway_data"
#   destination = "/data"
