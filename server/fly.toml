# Fly.io config for the vibefeed bus.
#   fly apps create vibefeed-bus
#   fly secrets set VIBEFEED_KEY=$(openssl rand -hex 18) --app vibefeed-bus
#   fly deploy --app vibefeed-bus --ha=false
app = "vibefeed-bus"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

# State is in-memory here (ephemeral): default channels/subscriptions are re-seeded on boot and
# the pushers repopulate content, so the demo self-heals on restart. For durable custom channels/
# subscriptions, add a volume and uncomment the mount below:
#   fly volumes create vibefeed_data --size 1 --region iad --app vibefeed-bus
# [env] VIBEFEED_STATE = "/data/.vibefeed-state.json"
# [[mounts]]
#   source = "vibefeed_data"
#   destination = "/data"
